name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            build_from: ghcr.io/home-assistant/amd64-base-debian:bookworm
          - arch: aarch64
            platform: linux/arm64
            build_from: ghcr.io/home-assistant/aarch64-base-debian:bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (${{ matrix.arch }})
        uses: docker/build-push-action@v7
        with:
          context: twingate-client
          platforms: ${{ matrix.platform }}
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
          push: false
          load: ${{ matrix.arch == 'amd64' }}
          tags: twingate-client-test:${{ matrix.arch }}

      - name: Verify twingate binary (amd64 only)
        if: matrix.arch == 'amd64'
        run: |
          docker run --rm twingate-client-test:amd64 which twingate
          docker run --rm twingate-client-test:amd64 twingate --version

      - name: Trivy vulnerability scan
        if: matrix.arch == 'amd64'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: twingate-client-test:amd64
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          vuln-type: os
          ignore-unfixed: true
