name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.DEPENDABOT_PAT }}

      - name: Calculate next version
        id: version
        run: |
          BUMP="${{ inputs.bump }}"
          CURRENT=$(grep '^version:' twingate-client/config.yaml | sed 's/version: "\(.*\)"/\1/')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "new=${NEW}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline --no-merges)
          else
            COMMITS=$(git log "${PREV_TAG}..HEAD" --oneline --no-merges)
          fi

          BREAKING=$(echo "$COMMITS" | grep -E '^[a-f0-9]+ breaking:' | sed 's/^[a-f0-9]* breaking: /- /' || true)
          FEATURES=$(echo "$COMMITS" | grep -E '^[a-f0-9]+ feat:' | sed 's/^[a-f0-9]* feat: /- /' || true)
          FIXES=$(echo "$COMMITS" | grep -E '^[a-f0-9]+ fix:' | sed 's/^[a-f0-9]* fix: /- /' || true)

          BODY=""
          [ -n "$BREAKING" ] && BODY="${BODY}## Breaking Changes\n${BREAKING}\n\n"
          [ -n "$FEATURES" ] && BODY="${BODY}## Features\n${FEATURES}\n\n"
          [ -n "$FIXES"    ] && BODY="${BODY}## Fixes\n${FIXES}\n\n"
          [ -z "$BODY"     ] && BODY="No conventional commits since ${PREV_TAG}.\n"

          {
            echo "body<<EOF"
            printf "%b" "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update config.yaml version
        run: |
          sed -i "s/^version: .*/version: \"${{ steps.version.outputs.new }}\"/" twingate-client/config.yaml

      - name: Update CHANGELOG.md
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          DATE=$(date +%Y-%m-%d)
          ENTRY="## [${TAG}] - ${DATE}\n\n${{ steps.changelog.outputs.body }}"

          if [ -f CHANGELOG.md ]; then
            TMP=$(mktemp)
            head -3 CHANGELOG.md > "$TMP"
            printf "\n%b\n" "$ENTRY" >> "$TMP"
            tail -n +4 CHANGELOG.md >> "$TMP"
            mv "$TMP" CHANGELOG.md
          else
            printf "# Changelog\n\nAll notable changes are documented here.\n\n%b\n" "$ENTRY" > CHANGELOG.md
          fi

      - name: Commit, tag and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add twingate-client/config.yaml CHANGELOG.md
          git commit -m "chore: bump version to ${{ steps.version.outputs.new }} [skip ci]"
          git tag "${{ steps.version.outputs.tag }}"
          git push --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.body }}
