name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: YAML lint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .config/.yamllint.yaml

      - name: Shellcheck
        run: |
          find . -name '*.sh' \
            -not -path '*/.git/*' \
            | xargs shellcheck --severity=warning

      - name: Hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: twingate-client/Dockerfile
          ignore: DL3008,DL3006

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: YAML validity
        run: ./tests/test_yaml_validity.sh

      - name: Config schema
        run: ./tests/test_config_schema.sh

      - name: Run script validation
        run: ./tests/test_run_no_key.sh
